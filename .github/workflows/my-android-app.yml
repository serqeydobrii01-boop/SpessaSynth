name: MY_ANDROID_BUILD
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Web
        run: |
          npm install
          npm install -g tsx
          npx tsx src/build/build.ts

      - name: Setup Capacitor and Fix Permissions
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init SpessaSynth com.spessa.app --web-dir dist
          npx cap add android
          
          # Прописываем разрешения в AndroidManifest
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml
          
          # Фикс дубликатов Kotlin
          echo "configurations.all { resolutionStrategy.eachDependency { if (requested.group == 'org.jetbrains.kotlin') { useVersion '1.8.22' } } }" >> android/app/build.gradle
          
          npx cap copy

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my-final-apk-with-fix
          path: android/app/build/outputs/apk/debug/app-debug.apk
