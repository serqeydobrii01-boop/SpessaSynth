name: MY_ANDROID_BUILD
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Web
        run: |
          npm install
          npm install -g tsx
          npx tsx src/build/build.ts
      - name: Build APK
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init SpessaSynth com.spessa.app --web-dir dist
          npx cap add android
          npx cap copy
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my-final-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
